<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Voice Editor Pro</title>
    <!-- Подключаем шрифты в стиле фэнтези -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b1120;
            --panel-bg: rgba(14, 23, 41, 0.85);
            --gold: #C5A059;
            --gold-hover: #e3bc6b;
            --text-main: #e0e6ed;
            --border-glow: 0 0 15px rgba(197, 160, 89, 0.2);
            --green: #2ecc71;
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #152038 0%, #060913 100%);
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 100%;
            flex-wrap: wrap;
        }

        .editor-container, .preview-container {
            background: var(--panel-bg);
            padding: 30px;
            border: 1px solid var(--gold);
            border-radius: 4px;
            box-shadow: var(--border-glow);
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        /* Декоративные уголки */
        .editor-container::before, .editor-container::after,
        .preview-container::before, .preview-container::after {
            content: ''; position: absolute; width: 10px; height: 10px; border: 1px solid var(--gold);
        }
        .editor-container::before, .preview-container::before { top: 4px; left: 4px; border-right: none; border-bottom: none; }
        .editor-container::after, .preview-container::after { bottom: 4px; right: 4px; border-left: none; border-top: none; }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 15px;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 1px;
        }

        textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(197, 160, 89, 0.5);
            color: var(--text-main);
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            border-radius: 2px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        textarea { height: 120px; resize: none; }
        textarea:focus, select:focus { border-color: var(--gold); box-shadow: inset 0 0 5px rgba(197, 160, 89, 0.3); }
        
        .char-counter { text-align: right; font-size: 12px; color: #888; margin-top: 5px; font-family: sans-serif;}

        .slider-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        input[type="range"] {
            -webkit-appearance: none; width: 100%; background: transparent; margin-top: 10px;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            height: 2px; background: rgba(197, 160, 89, 0.5); border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: var(--gold); cursor: pointer; margin-top: -6px; box-shadow: 0 0 5px var(--gold);
        }

        .btn {
            display: block; width: 100%; padding: 15px; margin-top: 25px;
            background: rgba(197, 160, 89, 0.1); color: var(--gold);
            border: 1px solid var(--gold); border-radius: 4px;
            font-family: 'Cinzel', serif; font-size: 18px; font-weight: bold;
            letter-spacing: 1px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { background: rgba(197, 160, 89, 0.2); box-shadow: var(--border-glow); }
        .btn:disabled { border-color: #555; color: #555; cursor: not-allowed; background: transparent; }
        
        .btn-download {
            background: rgba(46, 204, 113, 0.1); color: var(--green);
            border: 1px solid var(--green); margin-top: 15px;
        }
        .btn-download:hover { background: rgba(46, 204, 113, 0.2); box-shadow: 0 0 15px rgba(46, 204, 113, 0.2); }

        .preview-container {
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }

        .audio-player-container { 
            width: 100%; margin-top: 20px; padding: 20px; 
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(197, 160, 89, 0.3); 
            border-radius: 4px; display: none; box-sizing: border-box;
        }
        .audio-player-container p { margin: 0 0 15px 0; font-family: 'Cinzel', serif; color: var(--text-main); font-size: 16px; }
        audio { width: 100%; height: 40px; outline: none; border-radius: 4px; }
        
        .loader-container { display: none; text-align: center; margin-top: 20px; }
        .loader {
            border: 3px solid rgba(197, 160, 89, 0.3); border-radius: 50%;
            border-top: 3px solid var(--gold); width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        .progress-text { margin-top: 15px; font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 16px; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Левая панель: Настройки -->
    <div class="editor-container">
        <h2>Магия Голоса</h2>
        
        <label>Текст для озвучки (без ограничений)</label>
        <textarea id="textInput" placeholder="Введите заклинание или очень длинный текст..."></textarea>
        <div class="char-counter"><span id="charCount">0</span> символов</div>

        <div class="slider-group">
            <div>
                <label>Язык магии</label>
                <select id="langSelect">
                    <option value="ru">Русский (Russian)</option>
                    <option value="en">Английский (English)</option>
                </select>
            </div>
            <div>
                <label>Тембр голоса</label>
                <select id="voiceSelect">
                    <option value="Standard">Стандартный (Женский)</option>
                    <option value="Male">Мужской (Грубый)</option>
                    <option value="Child">Мультяшный / Детский</option>
                    <option value="Robot">Механический голем</option>
                </select>
            </div>
        </div>

        <div class="slider-group">
            <div>
                <label>Скорость произношения: <span id="speedVal">1.0</span></label>
                <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
            </div>
        </div>
    </div>

    <!-- Правая панель: Проверка и скачивание -->
    <div class="preview-container">
        <h2>Результат</h2>
        
        <p style="color: #888; font-style: italic; font-size: 15px; margin-bottom: 25px;">
            Создайте озвучку, проверьте результат, и если вам понравится — сохраните свиток на устройство.
        </p>

        <button id="checkBtn" class="btn">Проверить результат</button>
        
        <div id="loaderContainer" class="loader-container">
            <div class="loader"></div>
            <div id="progressText" class="progress-text">Подготовка заклинания...</div>
        </div>

        <!-- Контейнер плеера (появляется после генерации) -->
        <div class="audio-player-container" id="playerContainer">
            <p>Успешно создано! Прослушайте:</p>
            <audio id="audioPlayer" controls></audio>
            
            <button id="downloadBtn" class="btn btn-download">Скачать на устройство</button>
        </div>
    </div>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');
    const langSelect = document.getElementById('langSelect');
    const voiceSelect = document.getElementById('voiceSelect');
    const speedInput = document.getElementById('speed');
    const checkBtn = document.getElementById('checkBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const playerContainer = document.getElementById('playerContainer');
    const audioPlayer = document.getElementById('audioPlayer');
    const loaderContainer = document.getElementById('loaderContainer');
    const progressText = document.getElementById('progressText');

    let finalAudioBlob = null;

    // Обновление счетчика символов и UI
    textInput.addEventListener('input', () => {
        charCount.innerText = textInput.value.length;
        resetPlayer();
    });
    
    speedInput.addEventListener('input', () => {
        document.getElementById('speedVal').innerText = speedInput.value;
        resetPlayer();
    });

    langSelect.addEventListener('change', resetPlayer);
    voiceSelect.addEventListener('change', resetPlayer);

    function resetPlayer() {
        playerContainer.style.display = 'none';
        if (finalAudioBlob) {
            URL.revokeObjectURL(audioPlayer.src);
            finalAudioBlob = null;
        }
    }

    // Умная разбивка текста (чтобы не резать слова и обходить лимиты Google)
    function chunkText(text, maxLength = 150) {
        const words = text.split(/[\s\n]+/);
        const chunks = [];
        let currentChunk = "";

        for (let word of words) {
            if ((currentChunk + " " + word).length > maxLength) {
                if (currentChunk) chunks.push(currentChunk.trim());
                currentChunk = word;
            } else {
                currentChunk += (currentChunk ? " " : "") + word;
            }
        }
        if (currentChunk) chunks.push(currentChunk.trim());
        return chunks;
    }

    // Вспомогательная функция задержки для обхода банов
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // Функция скачивания через каскад прокси (Решает проблему с VPN)
    async function fetchAudioData(url) {
        // Список прокси. Если один заблокирован в РФ, сработает следующий.
        const proxies = [
            `https://corsproxy.io/?${encodeURIComponent(url)}`,
            `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
        ];

        for (let proxy of proxies) {
            try {
                const response = await fetch(proxy);
                if (response.ok) {
                    const buffer = await response.arrayBuffer();
                    // Проверяем, что вернулось аудио, а не заглушка от хостинга
                    if (buffer.byteLength > 200) {
                        return buffer;
                    }
                }
            } catch (e) {
                console.warn(`Прокси ${proxy} недоступен, пробуем следующий...`);
            }
        }
        throw new Error("Не удалось подключиться к серверам магии. Возможно, потребуется VPN.");
    }

    // Главная функция сотворения аудио
    checkBtn.addEventListener('click', async () => {
        const text = textInput.value.trim();
        if (!text) return alert("Пожалуйста, напишите текст для заклинания!");

        checkBtn.style.display = 'none';
        loaderContainer.style.display = 'block';
        resetPlayer();

        try {
            const lang = langSelect.value;
            const voiceType = voiceSelect.value;
            const speedMultiplier = parseFloat(speedInput.value);
            
            const chunks = chunkText(text);
            
            // AudioContext для обработки эффектов
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const buffers = [];

            // 1. Скачиваем аудио по кусочкам (Обход лимитов)
            for (let i = 0; i < chunks.length; i++) {
                progressText.innerText = `Сотворение магии: часть ${i + 1} из ${chunks.length}...`;
                
                // Используем клиент tw-ob, он работает стабильнее
                const googleTtsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=${lang}&q=${encodeURIComponent(chunks[i])}`;
                
                const arrayBuffer = await fetchAudioData(googleTtsUrl);
                const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
                buffers.push(audioBuffer);

                // Задержка между запросами для предотвращения бана по IP при огромных текстах
                if (i < chunks.length - 1) {
                    await sleep(400); 
                }
            }

            progressText.innerText = `Наложение звуковых эффектов...`;
            await sleep(100);

            // 2. Рассчитываем итоговую длину и скорость для эффектов
            let totalDuration = buffers.reduce((acc, buf) => acc + buf.duration, 0);
            if (totalDuration === 0) throw new Error("Аудио пустое");
            
            let rate = speedMultiplier;
            // Применяем магию искажения голоса
            if (voiceType === 'Male') rate *= 0.65; // Замедляем и понижаем тон
            if (voiceType === 'Child') rate *= 1.5; // Ускоряем и повышаем тон
            
            // Создаем оффлайн-контекст для рендеринга итогового файла
            const totalLength = Math.ceil(ctx.sampleRate * totalDuration * (1/rate));
            const offlineCtx = new OfflineAudioContext(1, totalLength, ctx.sampleRate);
            
            let currentTime = 0;

            // 3. Собираем кусочки воедино с эффектами
            for (let buf of buffers) {
                const source = offlineCtx.createBufferSource();
                source.buffer = buf;
                source.playbackRate.value = rate;

                if (voiceType === 'Robot') {
                    // Эффект Робота (Кольцевая модуляция)
                    const osc = offlineCtx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = 40; // Механический гул
                    
                    const gainNode = offlineCtx.createGain();
                    source.connect(gainNode);
                    osc.connect(gainNode.gain);
                    gainNode.connect(offlineCtx.destination);
                    
                    osc.start(currentTime);
                    osc.stop(currentTime + buf.duration * (1/rate));
                    source.start(currentTime);
                } else {
                    source.connect(offlineCtx.destination);
                    source.start(currentTime);
                }
                
                currentTime += buf.duration * (1/rate);
            }

            // 4. Рендерим и конвертируем в WAV файл
            const renderedBuffer = await offlineCtx.startRendering();
            finalAudioBlob = audioBufferToWav(renderedBuffer);
            
            // Показываем плеер
            audioPlayer.src = URL.createObjectURL(finalAudioBlob);
            playerContainer.style.display = 'block';

        } catch (error) {
            console.error(error);
            alert(error.message || "Произошла магическая ошибка. Проверьте соединение с интернетом.");
        } finally {
            checkBtn.style.display = 'block';
            loaderContainer.style.display = 'none';
        }
    });

    // Функция скачивания готового файла
    downloadBtn.addEventListener('click', () => {
        if (!finalAudioBlob) return;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(finalAudioBlob);
        a.download = `magic_voice_${new Date().getTime()}.wav`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    });

    // Утилита конвертации AudioBuffer в WAV Blob
    function audioBufferToWav(buffer) {
        let numOfChan = buffer.numberOfChannels,
            length = buffer.length * numOfChan * 2 + 44,
            bufferData = new ArrayBuffer(length),
            view = new DataView(bufferData),
            channels = [], i, sample, offset = 0, pos = 0;
        
        function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
        function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157); 
        setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
        setUint32(buffer.sampleRate); setUint32(buffer.sampleRate * 2 * numOfChan); 
        setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164); setUint32(length - pos - 4);

        for(i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

        while(pos < length) {
            for(i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][offset]));
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767)|0;
                view.setInt16(pos, sample, true); pos += 2;
            }
            offset++;
        }
        return new Blob([bufferData], {type: "audio/wav"});
    }
</script>

</body>
</html>
