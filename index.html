<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Voice Editor</title>
    <!-- Подключаем шрифты в стиле фэнтези -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b1120;
            --panel-bg: rgba(14, 23, 41, 0.85);
            --gold: #C5A059;
            --gold-hover: #e3bc6b;
            --text-main: #e0e6ed;
            --border-glow: 0 0 15px rgba(197, 160, 89, 0.2);
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #152038 0%, #060913 100%);
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 100%;
            flex-wrap: wrap;
        }

        .editor-container, .preview-container {
            background: var(--panel-bg);
            padding: 30px;
            border: 1px solid var(--gold);
            border-radius: 4px;
            box-shadow: var(--border-glow);
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        /* Декоративные уголки */
        .editor-container::before, .editor-container::after,
        .preview-container::before, .preview-container::after {
            content: ''; position: absolute; width: 10px; height: 10px; border: 1px solid var(--gold);
        }
        .editor-container::before, .preview-container::before { top: 4px; left: 4px; border-right: none; border-bottom: none; }
        .editor-container::after, .preview-container::after { bottom: 4px; right: 4px; border-left: none; border-top: none; }

        h2 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 15px;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 1px;
        }

        textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(197, 160, 89, 0.5);
            color: var(--text-main);
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            border-radius: 2px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        textarea { height: 100px; resize: none; }
        textarea:focus, select:focus { border-color: var(--gold); box-shadow: inset 0 0 5px rgba(197, 160, 89, 0.3); }
        
        .char-counter { text-align: right; font-size: 12px; color: #888; margin-top: 5px; font-family: sans-serif;}

        .slider-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        input[type="range"] {
            -webkit-appearance: none; width: 100%; background: transparent; margin-top: 10px;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            height: 2px; background: rgba(197, 160, 89, 0.5); border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: var(--gold); cursor: pointer; margin-top: -6px; box-shadow: 0 0 5px var(--gold);
        }

        .btn {
            display: block; width: 100%; padding: 12px; margin-top: 25px;
            background: transparent; color: var(--gold);
            border: 1px solid var(--gold); border-radius: 25px;
            font-family: 'Cinzel', serif; font-size: 16px; font-weight: bold;
            letter-spacing: 1px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover { background: rgba(197, 160, 89, 0.1); box-shadow: var(--border-glow); }
        .btn.ready { background: rgba(46, 204, 113, 0.2); border-color: #2ecc71; color: #2ecc71; }
        .btn.downloaded { border-color: #555; color: #888; cursor: default; background: transparent; }

        .preview-list { list-style: none; padding: 0; margin: 0; }
        .preview-list li { margin-bottom: 12px; font-size: 18px; border-bottom: 1px dashed rgba(197,160,89,0.2); padding-bottom: 5px; }
        .preview-list strong { font-family: 'Cinzel', serif; color: var(--gold); font-size: 14px; display: inline-block; width: 100px; }
        
        .preview-text-box {
            margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.2);
            border: 1px solid rgba(197,160,89,0.2); font-style: italic; min-height: 80px;
            word-wrap: break-word; color: #a9b7c6;
        }

        .audio-player-container { 
            margin-top: 20px; 
            padding: 15px; 
            background: rgba(197, 160, 89, 0.1); 
            border: 1px solid var(--gold); 
            border-radius: 8px;
            display: none; 
            text-align: center; 
        }
        .audio-player-container p { margin: 0 0 10px 0; font-family: 'Cinzel', serif; color: var(--gold); font-size: 14px; }
        audio { width: 100%; height: 35px; outline: none; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Левая панель: Настройки -->
    <div class="editor-container">
        <h2>Магия Голоса</h2>
        
        <label>Текст для озвучки</label>
        <textarea id="textInput" placeholder="Введите заклинание или текст..." maxlength="200"></textarea>
        <div class="char-counter"><span id="charCount">0</span> / 200</div>

        <div class="slider-group">
            <div>
                <label>Язык магии</label>
                <select id="langSelect">
                    <option value="ru">Русский (Russian)</option>
                    <option value="en">Английский (English)</option>
                </select>
            </div>
            <div>
                <label>Тембр голоса</label>
                <select id="voiceSelect">
                    <option value="Standard">Стандартный (Студия)</option>
                    <option value="Male">Мужской баритон</option>
                    <option value="Female">Женское сопрано</option>
                    <option value="Robot">Механический</option>
                </select>
            </div>
        </div>

        <div class="slider-group">
            <div>
                <label>Скорость: <span id="speedVal">1.0</span></label>
                <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
            </div>
            <div>
                <label>Высота (Pitch): <span id="pitchVal">1.0</span></label>
                <input type="range" id="pitch" min="0" max="2" step="0.1" value="1">
            </div>
        </div>

        <button id="actionBtn" class="btn">Создать озвучку</button>
    </div>

    <!-- Правая панель: Предпросмотр -->
    <div class="preview-container">
        <h2>Предпросмотр</h2>
        <ul class="preview-list">
            <li><strong>Язык:</strong> <span id="prev-lang">Русский</span></li>
            <li><strong>Скорость:</strong> <span id="prev-speed">1.0</span></li>
        </ul>
        
        <label>Свиток с текстом:</label>
        <div class="preview-text-box" id="prev-text">Ожидание текста...</div>

        <!-- Контейнер плеера (появляется после генерации) -->
        <div class="audio-player-container" id="playerContainer">
            <p>Прослушайте результат:</p>
            <audio id="audioPlayer" controls></audio>
        </div>
    </div>
</div>

<script>
    // Элементы UI
    const textInput = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');
    const langSelect = document.getElementById('langSelect');
    const voiceSelect = document.getElementById('voiceSelect');
    const speedInput = document.getElementById('speed');
    const pitchInput = document.getElementById('pitch');
    const actionBtn = document.getElementById('actionBtn');
    
    // Элементы предпросмотра
    const prevText = document.getElementById('prev-text');
    const prevLang = document.getElementById('prev-lang');
    const prevSpeed = document.getElementById('prev-speed');
    
    const playerContainer = document.getElementById('playerContainer');
    const audioPlayer = document.getElementById('audioPlayer');
    
    let generatedBlobUrl = null;

    // Функция обновления окна предпросмотра
    function updatePreview() {
        prevText.innerText = textInput.value || "Ожидание текста...";
        charCount.innerText = textInput.value.length;
        prevLang.innerText = langSelect.options[langSelect.selectedIndex].text;
        
        document.getElementById('speedVal').innerText = speedInput.value;
        prevSpeed.innerText = speedInput.value;
        
        document.getElementById('pitchVal').innerText = pitchInput.value;

        // При изменении настроек меняем кнопку обратно на генерацию
        if (actionBtn.getAttribute('data-state') === 'download' || actionBtn.getAttribute('data-state') === 'downloaded') {
            actionBtn.setAttribute('data-state', 'create');
            actionBtn.className = "btn";
            actionBtn.innerText = "Создать озвучку";
            playerContainer.style.display = 'none'; // Прячем плеер
            if (generatedBlobUrl) URL.revokeObjectURL(generatedBlobUrl);
        }
    }

    textInput.addEventListener('input', updatePreview);
    langSelect.addEventListener('change', updatePreview);
    voiceSelect.addEventListener('change', updatePreview);
    speedInput.addEventListener('input', updatePreview);
    pitchInput.addEventListener('input', updatePreview);

    // Главная логика генерации и скачивания
    actionBtn.addEventListener('click', async () => {
        const state = actionBtn.getAttribute('data-state') || 'create';

        if (state === 'create') {
            const text = textInput.value.trim();
            if (!text) return alert("Пожалуйста, напишите текст для заклинания!");
            if (text.length > 200) return alert("Текст слишком длинный. Максимум 200 символов.");

            actionBtn.innerText = "Сотворение магии...";
            actionBtn.style.color = "#fff";

            try {
                const lang = langSelect.value;
                const encodedText = encodeURIComponent(text);
                
                // Используем стабильный Google TTS через открытый CORS-прокси
                const googleUrl = `https://translate.googleapis.com/translate_tts?client=gtx&ie=UTF-8&tl=${lang}&q=${encodedText}`;
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(googleUrl)}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Сервер не ответил");
                
                const blob = await response.blob();
                
                if (generatedBlobUrl) URL.revokeObjectURL(generatedBlobUrl);
                generatedBlobUrl = URL.createObjectURL(blob);
                
                // Загружаем аудио в плеер
                audioPlayer.src = generatedBlobUrl;
                // Применяем скорость из ползунка прямо к плееру
                audioPlayer.playbackRate = parseFloat(speedInput.value);
                
                // Показываем плеер для прослушивания
                playerContainer.style.display = 'block';

                // Меняем состояние кнопки на скачивание
                actionBtn.setAttribute('data-state', 'download');
                actionBtn.className = "btn ready";
                actionBtn.innerText = "Скачать Свиток (MP3)";

            } catch (error) {
                console.error(error);
                alert("Произошла ошибка сети. Попробуйте еще раз.");
                actionBtn.innerText = "Создать озвучку";
                actionBtn.style.color = "var(--gold)";
            }
        } 
        else if (state === 'download') {
            // Скачивание файла на устройство
            const a = document.createElement('a');
            a.href = generatedBlobUrl;
            a.download = `magic_voice_${new Date().getTime()}.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            actionBtn.setAttribute('data-state', 'downloaded');
            actionBtn.className = "btn downloaded";
            actionBtn.innerText = "Успешно скачано";
        }
    });

    updatePreview();
</script>

</body>
</html>
